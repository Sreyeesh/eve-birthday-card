<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Eve 🌸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Pinyon+Script&family=Jost:wght@300;400&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #2a1a10;
  background-image:
    radial-gradient(ellipse at 20% 50%, #3d1f0e 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, #1a0d1a 0%, transparent 50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 16px 60px;
  font-family: 'Jost', sans-serif;
}

.scene {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  perspective: 1400px;
}

.book {
  position: relative;
  width: 100%;
  transform-style: preserve-3d;
}

/* ── COVER ── */
.cover {
  width: 100%;
  min-height: 600px;
  border-radius: 4px 20px 20px 4px;
  background: #f5ede0;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  box-shadow:
    -8px 0 0 #c8a97e,
    -10px 2px 6px rgba(0,0,0,0.4),
    4px 4px 40px rgba(0,0,0,0.5),
    inset -3px 0 8px rgba(0,0,0,0.08);
  transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1.000), box-shadow 0.9s ease;
  transform-origin: left center;
  transform-style: preserve-3d;
  backface-visibility: hidden;
}

.cover.opened {
  transform: rotateY(-170deg);
  box-shadow: -8px 0 0 #c8a97e, -10px 2px 6px rgba(0,0,0,0.4), -20px 10px 60px rgba(0,0,0,0.6);
}

.spine {
  position: absolute; left: 0; top: 0; bottom: 0; width: 18px;
  background: linear-gradient(90deg, #b8925a, #d4aa70, #b8925a);
  border-radius: 4px 0 0 4px;
}

.cover-art {
  position: absolute;
  inset: 18px 0 0 18px;
  background: linear-gradient(160deg, #fdf6ee 0%, #f7e8d0 50%, #f0d9b5 100%);
  border-radius: 0 18px 18px 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
}

.cover-flowers { width: 100%; margin-bottom: 20px; }
.cover-title { text-align: center; z-index: 2; }
.cover-title .happy { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 6px; text-transform: uppercase; color: #9b6a3a; display: block; margin-bottom: 6px; }
.cover-title .birthday { font-family: 'Pinyon Script', cursive; font-size: 72px; color: #5c2d0a; line-height: 0.9; display: block; text-shadow: 1px 2px 0 rgba(200,150,80,0.3); }
.cover-title .name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; letter-spacing: 8px; text-transform: uppercase; color: #7a3f10; display: block; margin-top: 10px; }
.cover-rule { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #c8a97e, transparent); margin: 16px auto; }
.cover-date { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: #a07040; letter-spacing: 2px; }

.corner { position: absolute; width: 44px; height: 44px; opacity: 0.4; }
.corner.tl { top: 26px; left: 26px; }
.corner.tr { top: 26px; right: 12px; transform: rotate(90deg); }
.corner.bl { bottom: 12px; left: 26px; transform: rotate(270deg); }
.corner.br { bottom: 12px; right: 12px; transform: rotate(180deg); }

.hint {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #a07040;
  opacity: 0.7; animation: hintPulse 2s ease-in-out infinite; white-space: nowrap;
}
@keyframes hintPulse { 0%,100%{opacity:0.5}50%{opacity:1} }

/* ── INSIDE ── */
.inside {
  position: absolute; top: 0; left: 0;
  width: 100%; min-height: 600px;
  display: flex;
  pointer-events: none; opacity: 0;
  transition: opacity 0.2s ease 0.4s;
}
.inside.visible { opacity: 1; pointer-events: auto; }

/* Left panel */
.inside-left {
  width: 42%;
  min-height: 600px;
  background: linear-gradient(160deg, #fdf6ee 0%, #f5e8d0 100%);
  border-radius: 4px 0 0 4px;
  border-right: 1px solid rgba(180,130,70,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  box-shadow: inset -6px 0 12px rgba(0,0,0,0.06);
}

.inside-left .mono-art { width: 100%; margin-bottom: 20px; }
.inside-left .left-title { font-family: 'Pinyon Script', cursive; font-size: 32px; color: #5c2d0a; text-align: center; line-height: 1.3; margin-bottom: 10px; }
.inside-left .left-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: #a07040; letter-spacing: 2px; text-align: center; }

/* Right panel */
.inside-right {
  flex: 1;
  min-height: 600px;
  background: linear-gradient(170deg, #fffdf8 0%, #fdf5e8 100%);
  border-radius: 0 20px 20px 0;
  padding: 28px 20px 20px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.sig-header {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #c0395a;
  margin-bottom: 8px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(192,57,90,0.15);
  position: relative; z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.refresh-btn {
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: #c0395a; opacity: 0.6; padding: 0;
  transition: opacity 0.2s, transform 0.4s;
  line-height: 1;
}
.refresh-btn:hover { opacity: 1; }
.refresh-btn.spinning { animation: spin 0.8s linear; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.signatures-list {
  flex: 1; overflow-y: auto;
  position: relative; z-index: 1;
  display: flex; flex-direction: column; gap: 12px;
  padding-right: 4px; margin-bottom: 8px;
}
.signatures-list::-webkit-scrollbar { width: 3px; }
.signatures-list::-webkit-scrollbar-thumb { background: rgba(192,57,90,0.2); border-radius: 2px; }

.sig-card {
  background: rgba(255,240,245,0.6);
  border: 0.5px solid rgba(192,57,90,0.12);
  border-radius: 10px;
  padding: 12px 14px;
  animation: fadeSlide 0.5s ease-out both;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.sig-name { font-family: 'Pinyon Script', cursive; font-size: 22px; color: #5c2d0a; line-height: 1; margin-bottom: 4px; }
.sig-message { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: #5a3520; line-height: 1.6; }

.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px; opacity: 0.45;
}
.empty-state .empty-icon { font-size: 28px; }
.empty-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: #9b6a3a; text-align: center; line-height: 1.6; }

.loading-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
.loading-dots { display: flex; gap: 6px; }
.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: #c0395a; opacity: 0.4;
  animation: dotPulse 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
.loading-state p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: #a07040; }

.status-bar {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 11px; color: #a07040;
  text-align: center; padding: 4px 0 0; opacity: 0.7;
  position: relative; z-index: 1; min-height: 18px;
}

/* Confetti */
.confetti-piece {
  position: fixed; pointer-events: none; z-index: 9999;
  border-radius: 2px; opacity: 0;
  animation: cfall 2s ease-out forwards;
}
@keyframes cfall { 0%{opacity:1;transform:translateY(0) rotate(0deg)} 100%{opacity:0;transform:translateY(300px) rotate(600deg)} }

.inside.visible .inside-left { animation: fadeSlide 0.5s 0.4s ease-out both; opacity: 0; }
.inside.visible .sig-header  { animation: fadeSlide 0.5s 0.55s ease-out both; opacity: 0; }
</style>
</head>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwXr0d4t5xa2GjMk0wd2k6ZLabl8j20WkTV_NDGxQGivMrkOeG2FfN4rU-3oinVrjaA/exec';

function openCard() {
  const cover = document.getElementById('cover');
  const inside = document.getElementById('inside');
  if (cover.classList.contains('opened')) return;
  cover.classList.add('opened');
  inside.classList.add('visible');
  fetchMessages(false);
}

async function fetchMessages(manual) {
  const list = document.getElementById('sigList');
  const statusBar = document.getElementById('statusBar');
  const refreshBtn = document.querySelector('.refresh-btn');

  if (manual) {
    refreshBtn.classList.add('spinning');
    setTimeout(() => refreshBtn.classList.remove('spinning'), 800);
    statusBar.textContent = 'Refreshing…';
  }

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    list.innerHTML = '';

    if (!data || data.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<span class="empty-icon">🌹</span><p>No messages yet —<br>be the first to sign!</p>';
      list.appendChild(empty);
      statusBar.textContent = '';
    } else {
      data.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'sig-card';
        card.style.animationDelay = (i * 0.07) + 's';
        card.innerHTML = `
          <div class="sig-name">${escHtml(s.name)}</div>
          <div class="sig-message">"${escHtml(s.message)}"</div>
        `;
        list.appendChild(card);
      });
      list.scrollTop = list.scrollHeight;
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      statusBar.textContent = data.length + ' message' + (data.length !== 1 ? 's' : '') + ' · updated ' + now;
    }
  } catch (err) {
    list.innerHTML = '';
    const errEl = document.createElement('div');
    errEl.className = 'empty-state';
    errEl.innerHTML = '<span class="empty-icon">🌸</span><p>Couldn\'t load messages.<br>Tap ↻ to try again.</p>';
    list.appendChild(errEl);
    statusBar.textContent = '';
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
